name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Release
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            build_type: Release
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Configure CMake
        run: >
          cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -G
          "Unix Makefiles" -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{matrix.c_compiler }} -DCMAKE_BUILD_TYPE=${{
          matrix.build_type }} 

      - name: Build
        run: >
          cmake --build ${{ github.workspace }}/build --config ${{
          matrix.build_type }}

      - name: Test
        working-directory: ${{ github.workspace }}/build/tests
        run: >
          ctest --build-config ${{ matrix.build_type }}
